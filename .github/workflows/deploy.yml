name: Deploy Agentic Deployment Guardian

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite (must pass before deploy)
        env:
          DATABASE_URL: postgresql+psycopg2://guardian:guardian@localhost:5432/guardian
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret
          API_PASSWORD: ci-test-password
          GUARDIAN_ENC_KEY: ci-test-enc-key
          GITHUB_WEBHOOK_SECRET: test-webhook-secret
        run: pytest --cov=app --cov-report=term-missing

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Base64-encode the SSH key to a single line so it survives .env and the
      # ssh-action env transport. The key is read from an env var (safe for the
      # multiline value) and written to $GITHUB_ENV, never to the logs.
      - name: Encode SSH key for runtime remediation
        env:
          RAW_VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: echo "VPS_SSH_KEY_B64=$(printf '%s' "$RAW_VPS_SSH_KEY" | base64 -w0)" >> "$GITHUB_ENV"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Repo secret names cannot start with GITHUB_ (reserved prefix), so the
          # secret is stored as WEBHOOK_SECRET and exposed as GITHUB_WEBHOOK_SECRET.
          GITHUB_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY_B64: ${{ env.VPS_SSH_KEY_B64 }}
          # Optional repo Variables; empty -> safe defaults (restart on, rollback off).
          REMEDIATION_ENABLED: ${{ vars.REMEDIATION_ENABLED }}
          REMEDIATION_ROLLBACK_ENABLED: ${{ vars.REMEDIATION_ROLLBACK_ENABLED }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          envs: POSTGRES_PASSWORD,GITHUB_WEBHOOK_SECRET,GH_PAT,CEREBRAS_API_KEY,GMAIL_APP_PASSWORD,VPS_HOST,VPS_USER,VPS_SSH_KEY_B64,REMEDIATION_ENABLED,REMEDIATION_ROLLBACK_ENABLED
          script: |
            set -euo pipefail
            cd /home/guardian/agentic-deployment-guardian

            echo "::group::Sync repository"
            git fetch origin main
            git reset --hard origin/main
            echo "::endgroup::"

            echo "::group::Write .env (managed by pipeline, never committed)"
            : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD secret is not set in the repository}"
            : "${GITHUB_WEBHOOK_SECRET:?WEBHOOK_SECRET secret is not set in the repository}"
            : "${GH_PAT:?GH_PAT secret is not set in the repository}"
            : "${CEREBRAS_API_KEY:?CEREBRAS_API_KEY secret is not set in the repository}"
            : "${VPS_HOST:?VPS_HOST secret is not set in the repository}"
            : "${VPS_SSH_KEY_B64:?VPS_SSH_KEY secret is not set in the repository}"
            : "${GMAIL_APP_PASSWORD:?GMAIL_APP_PASSWORD secret is not set in the repository}"

            # Phase 9: generate JWT/encryption/API secrets on first deploy and
            # PRESERVE them across deploys (a changing GUARDIAN_ENC_KEY would make
            # previously-encrypted data unreadable). Read existing values if any.
            EX_JWT=$(grep -E '^JWT_SECRET=' .env 2>/dev/null | cut -d= -f2- || true)
            EX_ENC=$(grep -E '^GUARDIAN_ENC_KEY=' .env 2>/dev/null | cut -d= -f2- || true)
            EX_PW=$(grep -E '^API_PASSWORD=' .env 2>/dev/null | cut -d= -f2- || true)
            JWT_SECRET=${EX_JWT:-$(openssl rand -hex 32)}
            GUARDIAN_ENC_KEY=${EX_ENC:-$(openssl rand -hex 32)}
            API_PASSWORD=${EX_PW:-$(openssl rand -hex 16)}

            umask 077
            cat > .env <<EOF
            POSTGRES_USER=guardian
            POSTGRES_DB=guardian_db
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            ENVIRONMENT=production
            GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
            GH_PAT=${GH_PAT}
            CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
            VPS_HOST=${VPS_HOST}
            VPS_USER=${VPS_USER:-guardian}
            VPS_SSH_KEY_B64=${VPS_SSH_KEY_B64}
            REMEDIATION_ENABLED=${REMEDIATION_ENABLED:-true}
            REMEDIATION_ROLLBACK_ENABLED=${REMEDIATION_ROLLBACK_ENABLED:-false}
            GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
            GMAIL_FROM=philiposita1041@gmail.com
            GMAIL_TO=philiposita1041@gmail.com
            JWT_SECRET=${JWT_SECRET}
            API_USER=guardian
            API_PASSWORD=${API_PASSWORD}
            GUARDIAN_ENC_KEY=${GUARDIAN_ENC_KEY}
            EOF
            echo ".env written (POSTGRES_DB=guardian_db, POSTGRES_USER=guardian, secrets from repo secrets)"
            echo "::endgroup::"

            echo "::group::Build and start containers"
            docker compose up -d --build --remove-orphans
            # Reload nginx so it re-reads its config and re-resolves the app
            # upstream (app may have been recreated with a new IP by --build).
            docker compose restart nginx
            docker compose ps
            echo "::endgroup::"

            echo "::group::Health check (FastAPI :8100)"
            ok=0
            for i in $(seq 1 40); do
              if curl -fsS http://localhost:8100/health >/dev/null 2>&1; then
                echo "FastAPI is healthy"; ok=1; break
              fi
              echo "waiting for FastAPI... attempt $i"; sleep 3
            done
            if [ "$ok" -ne 1 ]; then
              echo "FastAPI did not become healthy in time"
              docker compose logs --tail=80
              exit 1
            fi
            echo "::endgroup::"

            echo "::group::Health check (Nginx reverse proxy :8101)"
            curl -fsS http://localhost:8101/health >/dev/null && echo "Nginx proxy -> FastAPI is healthy"
            echo "::endgroup::"

            echo "Deployment successful"
