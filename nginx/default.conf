server {
    listen 8101;
    server_name _;

    # Re-resolve the app hostname at request time via Docker's embedded DNS, so
    # nginx survives the app container getting a new IP (deploys / SERVICE_RESTART
    # remediation) instead of caching a stale upstream IP and returning 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $guardian_upstream app;
        proxy_pass http://$guardian_upstream:8100;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
