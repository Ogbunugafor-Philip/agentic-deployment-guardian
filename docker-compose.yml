name: guardian

services:
  app:
    build: .
    image: guardian-app:latest
    container_name: guardian-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-guardian}:${POSTGRES_PASSWORD:-guardian}@db:5432/${POSTGRES_DB:-guardian}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GH_PAT: ${GH_PAT:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM: ${GMAIL_FROM:-philiposita1041@gmail.com}
      GMAIL_TO: ${GMAIL_TO:-philiposita1041@gmail.com}
      # Phase 9 — hardening
      JWT_SECRET: ${JWT_SECRET:-}
      API_USER: ${API_USER:-guardian}
      API_PASSWORD: ${API_PASSWORD:-}
      GUARDIAN_ENC_KEY: ${GUARDIAN_ENC_KEY:-}
    ports:
      - "8100:8100"          # FastAPI (assigned project port)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - guardian-net

  worker:
    build: .
    image: guardian-app:latest
    container_name: guardian-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    # The worker has no HTTP server, so disable the image's curl-based healthcheck.
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-guardian}:${POSTGRES_PASSWORD:-guardian}@db:5432/${POSTGRES_DB:-guardian}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
      GH_PAT: ${GH_PAT:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      # Phase 6 — autonomous remediation
      REMEDIATION_ENABLED: ${REMEDIATION_ENABLED:-true}
      REMEDIATION_ROLLBACK_ENABLED: ${REMEDIATION_ROLLBACK_ENABLED:-false}
      HEALTH_CHECK_URL: ${HEALTH_CHECK_URL:-http://app:8100/health}
      VPS_HOST: ${VPS_HOST:-}
      VPS_USER: ${VPS_USER:-guardian}
      VPS_SSH_KEY_B64: ${VPS_SSH_KEY_B64:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM: ${GMAIL_FROM:-philiposita1041@gmail.com}
      GMAIL_TO: ${GMAIL_TO:-philiposita1041@gmail.com}
      # Phase 9 — hardening (worker needs the encryption key for raw logs)
      GUARDIAN_ENC_KEY: ${GUARDIAN_ENC_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - guardian-net

  db:
    image: postgres:16-alpine
    container_name: guardian-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian}
      POSTGRES_DB: ${POSTGRES_DB:-guardian}
    ports:
      - "127.0.0.1:5433:5432" # Postgres (assigned port, bound to localhost only)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guardian} -d ${POSTGRES_DB:-guardian}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guardian-net

  redis:
    image: redis:7-alpine
    container_name: guardian-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379" # Redis (assigned port, bound to localhost only)
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guardian-net

  nginx:
    image: nginx:1.27-alpine
    container_name: guardian-nginx
    restart: unless-stopped
    ports:
      - "8101:8101"           # Nginx reverse proxy (assigned project port)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - guardian-net

volumes:
  pgdata:
  redisdata:

networks:
  guardian-net:
    driver: bridge
